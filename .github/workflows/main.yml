name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Get version from tag
      id: vars
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

    - name: Pack NuGet package
      run: dotnet pack --configuration Release --no-build -o ./nupkgs /p:Version=${{ env.VERSION }}
      
    - name: Check if package version already exists
      run: |
      if curl -sSf "https://api.nuget.org/v3-flatcontainer/teamsl.data.abstractions/${{ env.VERSION }}/teamsl.data.abstractions.${{ env.VERSION }}.nupkg"; then
        echo "Version ${{ env.VERSION }} already exists on NuGet. Aborting."; exit 1;
      fi

    - name: Publish to NuGet
      run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
